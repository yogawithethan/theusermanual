<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Islands • Sandbox</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="eyebrow">Simple Card Editor</div>
          <h1>Islands • Sandbox</h1>
        </div>

        <div class="topbar-center">
          <div class="eyebrow">Current Card</div>
          <div class="current-card-name" id="current-card-name">Loading…</div>
        </div>

        <div class="topbar-actions">
          <div class="save-state" id="save-state">Loading…</div>
          <button type="button" class="save-button" id="save-button">Save</button>
        </div>
      </header>

      <main class="workspace">
        <section class="canvas-stage">
          <div class="canvas-inner">
            <article class="editor-card" id="editor-card" tabindex="0">
              <button type="button" class="card-part card-icon" id="card-icon" aria-label="Select icon"></button>

              <h2
                class="card-part card-title"
                id="card-title"
                contenteditable="true"
                spellcheck="true"
                aria-label="Card title"
              ></h2>

              <div
                class="card-part card-description"
                id="card-description"
                contenteditable="true"
                spellcheck="true"
                aria-label="Card description"
              ></div>
            </article>
          </div>
        </section>

        <aside class="controls-panel">
          <div class="panel-head">
            <div class="eyebrow">Selected Part</div>
            <h2 id="panel-title">Card Shell</h2>
            <p id="panel-copy">Adjust the overall card look.</p>
          </div>

          <div id="controls-host"></div>
        </aside>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
